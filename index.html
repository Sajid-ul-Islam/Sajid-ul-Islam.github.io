<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sajid Islam — Portfolio</title>
  <script>
    (function() {
      const savedTheme = localStorage.getItem('portfolio-active-theme') || 'theme-sketchbook.html';
      if (savedTheme !== 'index.html') {
        window.location.replace(savedTheme);
      } else {
        window.location.replace('theme-sketchbook.html');
      }
    })();
  </script>
  <style>
    body {
      background-color: #0b0f19;
      color: #38bdf8;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .loader-container {
      text-align: center;
    }
    .spinner {
      border: 2px solid rgba(56, 189, 248, 0.1);
      border-top: 2px solid #38bdf8;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .text {
      font-size: 13px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div class="loader-container">
    <div class="spinner"></div>
    <div class="text">Routing to active theme...</div>
  </div>
</body>
</html>
